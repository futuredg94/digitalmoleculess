<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Digital Molecules</title>
    <meta name="description" content="Detailed product information including CAS number, molecular weight, and specifications.">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ===== Header ===== -->
    <header class="header">
        <div class="container nav">
            <div class="logo">Digital Molecules</div>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="products.html">Products</a>
            </nav>
        </div>
    </header>

    <!-- ===== Product Detail ===== -->
    <section class="section">
        <div class="container" id="product-container">
            <!-- Injected via JS -->
        </div>
    </section>

    <!-- ===== Not Found ===== -->
    <section id="not-found" class="section" style="display: none;">
        <div class="container text-center">
            <h2>Product Not Found</h2>
            <p>The requested product could not be located.</p>
            <a href="products.html" class="btn mt-20">Back to Products</a>
        </div>
    </section>

    <!-- ===== Footer ===== -->
    <footer class="footer">
        <div class="container text-center">
            <p>© 2026 Digital Molecules. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>

    <script>
    /* =========================
       Product Detail Script
       ========================= */

    (function () {
        "use strict";

        document.addEventListener("DOMContentLoaded", init);

        async function init() {
            const id = getProductId();
            if (!id) {
                showNotFound();
                return;
            }

            try {
                const response = await fetch("data/products.json");
                if (!response.ok) throw new Error();

                const products = await response.json();
                const product = products.find(p => p.id === id);

                if (!product) {
                    showNotFound();
                    return;
                }

                renderProduct(product);

            } catch (err) {
                console.error(err);
                showNotFound();
            }
        }

        function getProductId() {
            const params = new URLSearchParams(window.location.search);
            return params.get("id");
        }

        function renderProduct(product) {
            const container = document.getElementById("product-container");

            container.innerHTML = `
                <div class="grid grid-2">

                    <div>
                        <div class="product-image">
                            <img src="${product.image || 'images/products/default.png'}" alt="${product.name}">
                        </div>
                    </div>

                    <div>
                        <h1>${product.name}</h1>
                        <p>${product.description || ""}</p>

                        <table class="table mt-20">
                            <tbody>
                                ${row("CAS Number", product.cas)}
                                ${row("Molecular Weight", product.mw)}
                                ${row("Molecular Formula", product.formula)}
                                ${row("Category", product.category)}
                            </tbody>
                        </table>

                        <h3 class="mt-20">Specifications</h3>
                        <table class="table">
                            <tbody>
                                ${specRows(product.specifications)}
                            </tbody>
                        </table>
                    </div>

                </div>
            `;
        }

        function row(label, value) {
            if (!value) return "";
            return `<tr><th>${label}</th><td>${value}</td></tr>`;
        }

        function specRows(specs) {
            if (!specs) return "<tr><td>No specifications available</td></tr>";

            return Object.entries(specs)
                .map(([key, value]) => `
                    <tr>
                        <th>${formatKey(key)}</th>
                        <td>${value}</td>
                    </tr>
                `)
                .join("");
        }

        function formatKey(key) {
            return key.charAt(0).toUpperCase() + key.slice(1);
        }

        function showNotFound() {
            document.getElementById("product-container").style.display = "none";
            document.getElementById("not-found").style.display = "block";
        }

    })();
    </script>

</body>
</html>
