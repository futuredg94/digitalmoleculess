        <line x1="10" y1="-20" x2="15" y2="-40" stroke="#0f4c81" stroke-width="3" stroke-linecap="round"/>
        <path d="M-20,25 L-10,5 L10,5 L20,25 C20,35 -20,35 -20,25 Z" 
