        <path d="M-10,5 C-3,8 3,8 10,5" fill="none" stroke="#0f4c81" stroke-width="1.5" opacity="0.4"/>
        <circle cx="-8" cy="15" r="3" fill="#0f4c81" opacity="0.3"/>
        <circle cx="6" cy="12" r="2" fill="#0f4c81" opacity="0.3"/>
        <circle cx="-2" cy="22" r="2.5" fill="#0f4c81" opacity="0.3"/>
