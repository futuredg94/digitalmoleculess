<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | Digital Molecules</title>
    <meta name="description" content="Browse pharmaceutical impurities and specialty chemicals available from Digital Molecules.">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ===== Header ===== -->
    <header class="header">
        <div class="container nav">
            <div class="logo">Digital Molecules</div>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="products.html">Products</a>
            </nav>
        </div>
    </header>

    <!-- ===== Page Header ===== -->
    <section class="section">
        <div class="container">
            <h1>Product Catalog</h1>
            <p>
                Browse available pharmaceutical impurities and specialty compounds. 
                Use the search and filters to quickly locate specific materials.
            </p>
        </div>
    </section>

    <!-- ===== Filters ===== -->
    <section class="section light">
        <div class="container">

            <div class="grid grid-3">

                <!-- Search -->
                <div>
                    <label for="search">Search</label>
                    <input type="text" id="search" placeholder="Search by name, CAS number...">
                </div>

                <!-- Sort -->
                <div>
                    <label for="sort">Sort By</label>
                    <select id="sort">
                        <option value="name">Name (A–Z)</option>
                        <option value="name-desc">Name (Z–A)</option>
                        <option value="mw">Molecular Weight (Low → High)</option>
                        <option value="mw-desc">Molecular Weight (High → Low)</option>
                    </select>
                </div>

                <!-- Reset -->
                <div style="display: flex; align-items: flex-end;">
                    <button id="reset" class="btn btn-outline" style="width: 100%;">
                        Reset Filters
                    </button>
                </div>

            </div>

        </div>
    </section>

    <!-- ===== Product Grid ===== -->
    <section class="section">
        <div class="container">

            <div id="product-count" class="mb-20"></div>

            <div id="product-grid" class="grid grid-4">
                <!-- Products injected via JS -->
            </div>

        </div>
    </section>

    <!-- ===== Empty State ===== -->
    <section id="empty-state" class="section" style="display: none;">
        <div class="container text-center">
            <h2>No Products Found</h2>
            <p>Try adjusting your search or filter criteria.</p>
        </div>
    </section>

    <!-- ===== Footer ===== -->
    <footer class="footer">
        <div class="container text-center">
            <p>© 2026 Digital Molecules. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
    <script src="js/products.js"></script>
</body>
</html>
